services:
  - type: web
    name: india-weather
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: REFRESH_MINUTES
        value: "30"
